services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "127.0.0.1:18789:18789"
    env_file:
      - .env
    environment:
      OPENCLAW_STATE_DIR: /home/node/.openclaw
    volumes:
      - ./openclaw:/home/node/.openclaw
    command: ["openclaw", "gateway"]