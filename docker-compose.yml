services:
  openclaw:
    build: ./openclaw
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "127.0.0.1:18789:18789"
    env_file:
      - .env
    volumes:
      - ./openclaw:/home/node/.openclaw
    command: ["openclaw", "gateway"]

  bot:
    build: ./app
    container_name: refinance_bot
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./app:/usr/src/app
      - /usr/src/app/node_modules